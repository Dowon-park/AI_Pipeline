# Codex가 어떤 모델로 작업할지 정합니다.
# 현재 값 `gpt-5.4-mini`는 속도와 비용을 줄이면서도 실무 작업을 맡기기 쉬운 경량 모델입니다.
# 다른 선택지로는 같은 계열의 더 큰 모델인 `gpt-5.4` 같은 값을 둘 수 있습니다.
# 더 강한 모델로 올리면 추론 품질이 좋아지지만 느려지고, 더 작은 모델로 내리면 응답은 빨라지지만 복잡한 작업 정확도가 떨어질 수 있습니다.
model = "gpt-5.4-mini"

# 일반 작업에서 얼마나 깊게 생각할지 조절합니다.
# 현재 값 `medium`은 지나치게 길지 않게 균형을 잡아, 평범한 코드 작업에 무난한 추론량을 뜻합니다.
# 대표적인 다른 값은 `low`와 `high`입니다.
# 값을 높이면 더 꼼꼼해지지만 느려질 수 있고, 낮추면 빨라지지만 복잡한 판단에서 놓칠 가능성이 커집니다.
model_reasoning_effort = "medium"

# 계획을 세울 때 사용할 추론 강도를 정합니다.
# 현재 값 `high`는 작업 단계를 나눠 생각하는 계획 수립을 더 신중하게 하겠다는 뜻입니다.
# 대표적인 다른 값은 `low`와 `medium`입니다.
# 값을 높이면 계획이 더 안정적이지만 시간이 더 들 수 있고, 낮추면 빠르지만 단계 누락이나 얕은 계획이 생길 수 있습니다.
plan_mode_reasoning_effort = "high"

# Codex가 파일 시스템을 어디까지 수정할 수 있는지 정합니다.
# 현재 값 `workspace-write`는 이 저장소 안에서는 쓰기가 가능하고, 그 밖의 위치는 제한되는 안전한 작업 모드입니다.
# 대표적인 다른 값은 `read-only`와 `full-access`입니다.
# 더 제한적으로 두면 안전성은 높아지지만 수정이 어려워지고, 더 넓게 열면 작업 자유도는 커지지만 실수로 범위를 벗어날 위험도 커집니다.
sandbox_mode = "workspace-write"

# Codex가 제한된 작업에서 사용자 승인 없이 진행할 수 있는지를 정합니다.
# 현재 값 `on-request`는 필요한 경우에만 승인을 요청하는 균형형 정책입니다.
# 대표적인 다른 값은 `never`와 `on-failure`입니다.
# 더 엄격하게 하면 안전성은 높아지지만 매번 막힐 수 있고, 더 느슨하게 하면 흐름은 빨라지지만 의도치 않은 실행 위험이 커집니다.
approval_policy = "on-request"

[agents]
# 동시에 몇 개의 에이전트 작업을 돌릴지 제한합니다.
# 현재 값 `4`는 여러 작업을 병렬로 처리하면서도 시스템 부담을 과하게 키우지 않는 수준입니다.
# 더 작은 값으로는 `1`이나 `2`가 있고, 더 큰 값으로는 그 이상을 둘 수 있습니다.
# 값을 높이면 병렬 처리가 늘어나 속도가 좋아질 수 있지만 자원 사용이 커지고, 낮추면 안정적이지만 처리량이 줄어듭니다.
max_threads = 4

# 에이전트가 얼마나 깊게 다른 작업을 연쇄적으로 파고들 수 있는지 정합니다.
# 현재 값 `1`은 한 단계까지만 진행해 작업 범위를 단순하게 유지하겠다는 뜻입니다.
# 대표적인 다른 값은 `0`이나 `2` 이상입니다.
# 값을 높이면 더 복잡한 하위 작업까지 다룰 수 있지만 제어가 어려워지고, 낮추면 더 단순하지만 처리 범위가 좁아집니다.
max_depth = 1

# 개별 작업 하나가 얼마나 오래 실행될 수 있는지 제한합니다.
# 현재 값 `1800`은 30분 동안 작업을 허용해, 긴 분석이나 큰 작업에도 여유를 주는 설정입니다.
# 더 짧은 값으로는 수십 초나 수분 단위, 더 긴 값으로는 그 이상을 둘 수 있습니다.
# 값을 줄이면 멈춤을 빨리 감지하지만 큰 작업이 끊길 수 있고, 값을 늘리면 여유는 커지지만 무한정 오래 붙잡힐 위험도 커집니다.
job_max_runtime_seconds = 1800
